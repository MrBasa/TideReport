# Run all unit and integration tests on Linux (GNU date) and macOS (BSD date) for compatibility.
name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            date_variant: GNU
          - os: macos-latest
            date_variant: BSD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Fish shell
        uses: fish-shop/install-fish-shell@v2

      # Run all tests through the isolated local runner for parity with developer workflows.
      - name: Run tests (on ${{ matrix.os }}, ${{ matrix.date_variant }} date)
        env:
          RUN_NETWORK_TESTS: 1
        run: |
          fish --no-config scripts/run_tests_isolated.fish
